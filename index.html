<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>约饭小程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
        }
        .question {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .yes-btn {
            background-color: #ff6b6b;
            color: white;
        }
        .yes-btn:hover {
            background-color: #ff5252;
        }
        .no-btn {
            background-color: #e0e0e0;
            color: #333;
            position: relative;
        }
        .no-btn:hover {
            background-color: #bdbdbd;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #333;
        }
        .time-selector, .food-selector {
            margin-bottom: 30px;
        }
        select, input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            margin: 0 5px;
        }
        .food-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .food-option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .food-option.selected {
            border-color: #ff6b6b;
            background-color: #fff5f5;
        }
        .result {
            font-size: 20px;
            margin-bottom: 30px;
            color: #333;
        }
        .back-btn {
            background-color: #e0e0e0;
            color: #333;
            margin-right: 10px;
        }
        .back-btn:hover {
            background-color: #bdbdbd;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 邀约页 -->
        <div id="page1" class="page active">
            <img src="IMG_0234.jpeg" alt="头像" class="avatar">
            <div class="question">可以和我一起约会吗？</div>
            <div class="btn-group">
                <button class="btn yes-btn" onclick="goToPage(2)">愿意</button>
                <button class="btn no-btn" id="noBtn">不要</button>
            </div>
        </div>

        <!-- 确认页 -->
        <div id="page2" class="page">
            <div class="title">等下，你真的点了愿意？</div>
            <div class="result">我都已经准备好被你点“不要”了</div>
            <button class="btn yes-btn" onclick="goToPage(3)">下一步</button>
        </div>

        <!-- 时间选择页 -->
        <div id="page3" class="page">
            <div class="title">选择约会时间</div>
            <div class="time-selector">
                <input type="date" id="date">
                <input type="time" id="time">
            </div>
            <div class="btn-group">
                <button class="btn back-btn" onclick="goToPage(2)">返回</button>
                <button class="btn yes-btn" onclick="goToPage(4)">下一步</button>
            </div>
        </div>

        <!-- 餐食选择页 -->
        <div id="page4" class="page">
            <div class="title">选择吃什么</div>
            <div class="food-selector">
                <div class="food-options">
                    <div class="food-option" onclick="selectFood(this)">火锅</div>
                    <div class="food-option" onclick="selectFood(this)">寿司</div>
                    <div class="food-option" onclick="selectFood(this)">烤肉</div>
                    <div class="food-option" onclick="selectFood(this)">披萨</div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn back-btn" onclick="goToPage(3)">返回</button>
                <button class="btn yes-btn" onclick="goToPage(5)">确认</button>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="page5" class="page">
            <div class="title">约会确认</div>
            <div class="result" id="resultText"></div>
            <div class="result">带好胃口，我带好路线</div>
            <div class="result">真开心你没有拒绝～我会准时来接你！</div>
        </div>
    </div>

    <script>
        // 页面切换函数
        function goToPage(pageNum) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // 显示目标页面
            document.getElementById(`page${pageNum}`).classList.add('active');
            
            // 如果是结果页，生成确认信息
            if (pageNum === 5) {
                const date = document.getElementById('date').value;
                const time = document.getElementById('time').value;
                const food = document.querySelector('.food-option.selected').textContent;
                document.getElementById('resultText').textContent = `${date} ${time}，我们去吃${food}`;
            }
        }

        // 不要按钮随机移动
        const noBtn = document.getElementById('noBtn');
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 400) + 200;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 400) + 200;
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        // 选择餐食
        function selectFood(element) {
            // 取消其他选中状态
            document.querySelectorAll('.food-option').forEach(option => {
                option.classList.remove('selected');
            });
            // 选中当前选项
            element.classList.add('selected');
        }

        // 默认选中烤肉
        document.querySelectorAll('.food-option')[2].classList.add('selected');
    </script>
</body>
</html>
